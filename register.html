<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .register-card {
      background: #1e1e1e;
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
      padding: 32px;
      width: min(420px, 90vw);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 1.9rem;
      text-align: center;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #141414;
      color: #f0f0f0;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    .error {
      color: #ff6b6b;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
    }

    .footer a {
      color: #7ccfff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="register-card">
    <h1>Create an account</h1>
    <div id="errorMessage" class="error" aria-live="polite"></div>
    <form id="registerForm" action="register.php" method="post">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="Choose a username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter a password" required minlength="6" />

      <label for="confirmPassword">Confirm Password</label>
      <input id="confirmPassword" name="confirm_password" type="password" placeholder="Repeat your password" required minlength="6" />

      <button type="submit">Register</button>
    </form>
    <div class="footer">
      <p> <a href="login.html">Sign in</a></p>
    </div>
  </main>
  <script src="register.js"></script>
  <script src="settings.js"></script>
</body>
</html>
