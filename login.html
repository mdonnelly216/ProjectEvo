<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectEvo Login</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <main class="login-card">
    <h1>ProjectEvo Login</h1>
    <div id="errorMessage" class="error" aria-live="polite"></div>
    <form id="loginForm" action="login.php" method="post">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" placeholder="your username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter your password" required minlength="6" />

      <button type="submit">Sign In</button>
    </form>
    <p style="text-align:center; margin-top: 16px;">
      Don't have an account? <a href="register.html" style="color:#7ccfff; text-decoration:none;">Register</a>
    </p>
  </main>
  <script src="login.js"></script>
</body>
</html>
